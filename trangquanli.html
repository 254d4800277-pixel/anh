<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Kỹ Năng - Ma Trận Năng Lực</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-4">
      <ul
        class="nav nav-tabs justify-content-center bg-white p-2 rounded shadow-sm"
      >
        <li class="nav-item">
          <a class="nav-link text-primary fw-bold" href="trang chu.html"
            >🏠 Trang Chủ</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link active text-success fw-bold"
            href="trangquanli.html"
            >🛠 Quản Lý Kỹ Năng</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger fw-bold" href="trangbug.html"
            >🐞 Trang Debug</a
          >
        </li>
      </ul>
    </div>

    <div class="container my-5">
      <h2 class="section-title text-success border-success mb-4">
        Quản Lý Kỹ Năng
      </h2>

      <div id="alertContainer"></div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card shadow-sm p-4">
            <h4 class="mb-3 text-secondary border-bottom pb-2">Thêm Kỹ Năng</h4>
            <form id="skillForm">
              <div class="mb-3">
                <label class="form-label fw-semibold"
                  >Mã số sinh viên (MSSV)</label
                >
                <input
                  type="number"
                  id="mssv"
                  class="form-control"
                  placeholder="Nhập MSSV tính toán hàng chèn"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Tên công nghệ</label>
                <input
                  type="text"
                  id="techName"
                  class="form-control"
                  placeholder="Ví dụ: ReactJS, Python..."
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Năm ban hành</label>
                <input
                  type="number"
                  id="releaseYear"
                  class="form-control"
                  placeholder="Ví dụ: 2015"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold"
                  >Mức độ (1-10):
                  <span id="levelValue" class="text-success fw-bold"
                    >5</span
                  ></label
                >
                <input
                  type="range"
                  id="skillLevel"
                  class="form-range"
                  min="1"
                  max="10"
                  value="5"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Ghi chú</label>
                <textarea
                  id="note"
                  class="form-control"
                  rows="2"
                  placeholder="Ghi chú cá nhân..."
                ></textarea>
              </div>
              <button
                type="submit"
                class="btn btn-success w-100 fw-bold shadow-sm"
              >
                Thêm vào ma trận
              </button>
            </form>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card shadow-sm p-4">
            <div
              class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2"
            >
              <h4 class="text-secondary mb-0">Ma Trận Năng Lực Hiện Tại</h4>
              <button
                class="btn btn-outline-danger btn-sm fw-semibold"
                onclick="clearAllData()"
              >
                Xóa toàn bộ bộ nhớ
              </button>
            </div>
            <div class="table-responsive">
              <table
                class="table table-striped table-hover align-middle border text-center custom-table"
              >
                <thead class="table-dark">
                  <tr>
                    <th>Tên công nghệ</th>
                    <th>Năm ban hành</th>
                    <th>Mức độ</th>
                    <th>Ghi chú</th>
                  </tr>
                </thead>
                <tbody id="skillTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
